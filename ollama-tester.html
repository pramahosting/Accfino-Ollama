<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ollama tester — AccFino</title>
<style>
  :root {
    --bg: #F7F6F2;
    --panel: #FFFFFF;
    --border: #E3E1D9;
    --text: #1F1E1A;
    --muted: #6B6A63;
    --accent: #0F6E56;
    --accent-hover: #0C5A46;
    --mono: "SF Mono", "Menlo", "Consolas", monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    height: 100%;
  }
  .topbar {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--panel);
  }
  .topbar h1 {
    font-size: 15px;
    font-weight: 600;
    margin: 0;
  }
  .topbar .sub {
    font-size: 12px;
    color: var(--muted);
  }
  .status-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #ccc;
    margin-right: 6px;
    vertical-align: middle;
  }
  .status-dot.ok { background: #3B9E6E; }
  .status-dot.bad { background: #D8503C; }

  .config-row {
    display: flex;
    gap: 10px;
    padding: 12px 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    align-items: center;
  }
  .config-row label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted);
    display: block;
    margin-bottom: 4px;
  }
  .config-row input {
    font-family: var(--mono);
    font-size: 13px;
    padding: 7px 9px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #FBFAF7;
    color: var(--text);
  }
  .config-row input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  #endpoint { width: 340px; }
  #model { width: 180px; }
  .check-btn {
    padding: 8px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: #FBFAF7;
    font-size: 13px;
    cursor: pointer;
    margin-top: 15px;
  }
  .check-btn:hover { background: #F0EEE7; }

  .panes {
    display: flex;
    height: calc(100vh - 118px);
  }
  .pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .pane + .pane { border-left: 1px solid var(--border); }
  .pane-header {
    padding: 10px 20px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  .pane-body {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
  }

  #question {
    width: 100%;
    height: 160px;
    resize: vertical;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.5;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--panel);
    color: var(--text);
  }
  #question:focus { outline: 2px solid var(--accent); outline-offset: 1px; }

  .send-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 14px;
  }
  #send {
    padding: 10px 20px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
  #send:hover { background: var(--accent-hover); }
  #send:disabled { background: #B9B6AC; cursor: default; }
  .timer { font-size: 12px; color: var(--muted); font-family: var(--mono); }

  .meta-line {
    font-size: 12px;
    color: var(--muted);
    margin-top: 18px;
    line-height: 1.6;
  }
  .meta-line code {
    background: #EFEDE5;
    padding: 1px 5px;
    border-radius: 4px;
    font-family: var(--mono);
  }

  #output {
    white-space: pre-wrap;
    font-size: 14px;
    line-height: 1.6;
    font-family: var(--mono);
  }
  #output.placeholder { color: var(--muted); font-family: inherit; }
  #output.error { color: #B0392A; }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid #D9D6CB;
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .stats {
    display: flex;
    gap: 18px;
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
  }
  .stats b { color: var(--text); }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1><span class="status-dot" id="statusDot"></span>Ollama tester</h1>
  </div>
  <div class="sub">AccFino / Northflank</div>
</div>

<div class="config-row">
  <div>
    <label for="endpoint">Ollama base URL</label>
    <input id="endpoint" type="text" value="https://p01--accfino-ollama--88w6ffk22j7r.code.run" />
  </div>
  <div>
    <label for="model">Model</label>
    <input id="model" type="text" value="0xroyce/Plutus-3B" />
  </div>
  <button class="check-btn" id="checkBtn">Check connection</button>
</div>

<div class="panes">
  <div class="pane">
    <div class="pane-header">Question</div>
    <div class="pane-body">
      <textarea id="question" placeholder="e.g. Classify this transaction: &quot;EFTPOS PURCHASE - WOOLWORTHS&quot;">Classify this bank transaction into a GL category: "EFTPOS PURCHASE - WOOLWORTHS 2145"</textarea>
      <div class="send-row">
        <button id="send">Send ↗</button>
        <span class="timer" id="timer"></span>
      </div>
      <div class="meta-line">
        Sends a POST to <code>/api/generate</code> with <code>stream: false</code>.<br>
        Model must already be pulled on the server (<code>ollama pull &lt;model&gt;</code>) or this will fail.
      </div>
    </div>
  </div>

  <div class="pane">
    <div class="pane-header">Response</div>
    <div class="pane-body">
      <div id="output" class="placeholder">Response will appear here.</div>
      <div class="stats" id="stats" style="display:none;"></div>
    </div>
  </div>
</div>

<script>
  const endpointInput = document.getElementById('endpoint');
  const modelInput = document.getElementById('model');
  const questionEl = document.getElementById('question');
  const sendBtn = document.getElementById('send');
  const checkBtn = document.getElementById('checkBtn');
  const outputEl = document.getElementById('output');
  const timerEl = document.getElementById('timer');
  const statsEl = document.getElementById('stats');
  const statusDot = document.getElementById('statusDot');

  function cleanBase(url) {
    return url.trim().replace(/\/+$/, '');
  }

  async function checkConnection() {
    statusDot.className = 'status-dot';
    const base = cleanBase(endpointInput.value);
    try {
      const res = await fetch(base + '/', { method: 'GET' });
      const text = await res.text();
      if (res.ok && text.toLowerCase().includes('ollama is running')) {
        statusDot.className = 'status-dot ok';
      } else {
        statusDot.className = 'status-dot bad';
      }
    } catch (err) {
      statusDot.className = 'status-dot bad';
    }
  }

  checkBtn.addEventListener('click', checkConnection);
  window.addEventListener('load', checkConnection);

  async function sendQuestion() {
    const base = cleanBase(endpointInput.value);
    const model = modelInput.value.trim();
    const prompt = questionEl.value.trim();

    if (!prompt) { return; }
    if (!model) {
      outputEl.textContent = 'Enter a model name first.';
      outputEl.className = 'error';
      return;
    }

    sendBtn.disabled = true;
    outputEl.className = '';
    outputEl.innerHTML = '<span class="spinner"></span>Waiting for response…';
    statsEl.style.display = 'none';
    const start = performance.now();

    let tickHandle = setInterval(() => {
      timerEl.textContent = ((performance.now() - start) / 1000).toFixed(1) + 's';
    }, 100);

    try {
      const res = await fetch(base + '/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: model, prompt: prompt, stream: false })
      });

      const elapsed = ((performance.now() - start) / 1000).toFixed(1);
      clearInterval(tickHandle);
      timerEl.textContent = elapsed + 's total';

      if (!res.ok) {
        const errText = await res.text();
        outputEl.className = 'error';
        outputEl.textContent = 'HTTP ' + res.status + '\n\n' + errText;
        return;
      }

      const data = await res.json();
      outputEl.className = '';
      outputEl.textContent = data.response || '(empty response)';

      statsEl.style.display = 'flex';
      statsEl.innerHTML =
        '<span>model: <b>' + (data.model || model) + '</b></span>' +
        '<span>total: <b>' + elapsed + 's</b></span>' +
        (data.eval_count ? '<span>tokens: <b>' + data.eval_count + '</b></span>' : '');

    } catch (err) {
      clearInterval(tickHandle);
      outputEl.className = 'error';
      outputEl.textContent = 'Request failed: ' + err.message +
        '\n\nLikely causes:\n' +
        '- OLLAMA_ORIGINS not set on the server (CORS block)\n' +
        '- Port set back to private on Northflank\n' +
        '- Model not pulled yet on the server';
    } finally {
      sendBtn.disabled = false;
    }
  }

  sendBtn.addEventListener('click', sendQuestion);
  questionEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) sendQuestion();
  });
</script>

</body>
</html>
