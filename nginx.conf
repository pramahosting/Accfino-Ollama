server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # Proxies browser requests to the internal, private Ollama service.
    # accfino-ollama:11434 is only reachable from inside this Northflank
    # project, which is exactly why this works without exposing Ollama.
    location /ollama-api/ {
        proxy_pass http://accfino-ollama:11434/;
        proxy_set_header Host accfino-ollama:11434;
        proxy_set_header Origin "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
